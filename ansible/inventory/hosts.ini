# =============================================================
# Ansible Inventory - Football Rental Infrastructure
# =============================================================
# CHOICE_A = Web Server (Docker container accessible via SSH)
#
# NOTE: Ansible runs inside Docker (via run-ansible.ps1).
#       So ansible_host uses the container name on the Docker network,
#       NOT localhost (which only works from the Windows host).
# =============================================================

[webserver]
CHOICE_A ansible_host=football-rental-webserver ansible_port=22 ansible_user=root ansible_password=rootpassword ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[webserver:vars]
# Project settings
app_dir=/app
repo_url=https://github.com/sanaSOK/DevOps-Final-Exam.git

# MySQL settings (inside the webserver container, it connects to mysql-db service)
mysql_host=mysql-db
mysql_port=3306
mysql_db=SANA-db
mysql_user=root
mysql_password=Hello@123
mysql_backup_dir=/app/backups
