# =============================================================
# Test Profile: SQLite datasource (in-memory, no MySQL needed)
# Activated via Spring profile: test
# =============================================================
spring.application.name=football-rental

# Server
server.port=8080

# -------------------------------------------------------
# SQLite DataSource (used during testing only)
# -------------------------------------------------------
spring.datasource.url=jdbc:sqlite:target/test.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA / Hibernate - SQLite dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
