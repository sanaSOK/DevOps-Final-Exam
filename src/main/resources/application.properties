spring.application.name=football-rental

# Server
server.port=8080

# MySQL DataSource
# When running in Docker, SPRING_DATASOURCE_URL env var overrides this value
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/football_rental?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jackson
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
